<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <title>Conversor de Moedas</title>
</head>

<body>

    <img class="logo" src="./assets/logo.gif" alt="Logo">

    <main>

            <label>
                Converter <b>de:</b>
                <select class="currency-select-up">
                    <option value="BRL">Real Brasileiro (BRL)</option>
                    <option value="USD">Dólar Americano (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Libra Esterlina (GBP)</option>
                    <option value="JPY">Iene Japonês (JPY)</option>
                </select>
            </label>

            <label>
                Converter <b>para:</b>
                <select class="currency-select-down">
                    <option value="USD">Dólar Americano (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Libra Esterlina (GBP)</option>
                    <option value="JPY">Iene Japonês (JPY)</option>
                    <option value="BRL">Real Brasileiro (BRL)</option>
                </select>
            </label>

            <label>
                Valor:
                <input type="number" class="input-currency" placeholder="R$ 10.000,00" />
            </label>

            <button class="convert-button">Converter</button>

        <section>

            <div class="currency-box">
                <img class="currency-img-from" src="./assets/bandeira-brasil.png">
                <p class="currency" id="currency-name-from">Real Brasileiro (BRL)</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>
            <img class="arrow" src="./assets/Vector.png" alt="Seta de conversão">
            <div class="currency-box">
                <img class="currency-img-to" src="./assets/bandeira-eua.png">
                <p class="currency" id="currency-name-to">Dólar Americano (USD)</p>
                <p class="currency-value">$ 0,00</p>
            </div>
                
        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
